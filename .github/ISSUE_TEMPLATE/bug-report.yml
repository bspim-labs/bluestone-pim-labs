name: Bug report
description: Something broken on the Labs site.
labels: ["bug"]
body:
  - type: input
    id: url
    attributes:
      label: Page or URL
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What you expected
  - type: input
    id: browser
    attributes:
      label: Browser and OS
