<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>404 · Bluestone PIM LABS</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/png" href="/public/bluestone_pim_logo.png">
  <script>
    (function () {
      const stored = localStorage.getItem('theme');
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      if (stored === 'dark' || (!stored && prefersDark)) {
        document.documentElement.classList.add('dark');
      }
    })();
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class' };</script>
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 antialiased min-h-screen flex flex-col">

  <!-- Header -->
  <header class="bg-white dark:bg-slate-900 border-b border-slate-200 dark:border-slate-700/60">
    <div class="max-w-4xl mx-auto px-6 py-4 flex items-center justify-between">
      <a href="/" class="flex items-center gap-3 no-underline">
        <img src="/public/bluestone_pim_logo.png" alt="Bluestone PIM" class="h-8 w-auto object-contain shrink-0">
        <span class="font-semibold text-slate-900 dark:text-slate-100 text-sm">Bluestone PIM LABS 🧪</span>
      </a>
    </div>
  </header>

  <!-- 404 -->
  <main class="flex-1 flex items-center justify-center px-6">
    <div class="text-center max-w-md">
      <p class="text-8xl font-bold mb-6" style="color: #3E74F4; opacity: 0.15; line-height:1;">404</p>
      <h1 class="text-2xl font-bold text-slate-900 dark:text-slate-100 mb-3 -mt-8">Nothing here</h1>
      <p class="text-slate-500 dark:text-slate-400 leading-relaxed mb-8">
        This page does not exist. It may have moved, or the link was wrong to begin with.
      </p>
      <a href="/"
        class="inline-flex items-center gap-2 bg-slate-900 dark:bg-slate-100 text-slate-100 dark:text-slate-900 px-5 py-2.5 rounded-lg text-sm font-medium hover:bg-slate-700 dark:hover:bg-white transition-colors">
        Back to Labs
      </a>
    </div>
  </main>

  <!-- Footer -->
  <footer class="border-t border-slate-200 dark:border-slate-800">
    <div class="max-w-4xl mx-auto px-6 py-6">
      <p class="text-sm text-slate-400 dark:text-slate-600 text-center">
        Bluestone PIM LABS · Community projects, not official products
      </p>
    </div>
  </footer>

</body>
</html>
