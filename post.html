<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Loading — Bluestone PIM Labs</title>
  <meta name="description" content="">
  <link rel="canonical" id="meta-canonical" href="https://bluestone-labs-landing.vercel.app/blog">
  <meta property="og:type" content="article">
  <meta property="og:site_name" content="Bluestone PIM Labs">
  <meta id="meta-og-title"       property="og:title"       content="Bluestone PIM Labs">
  <meta id="meta-og-description" property="og:description" content="">
  <meta id="meta-og-url"         property="og:url"         content="https://bluestone-labs-landing.vercel.app/blog">
  <meta id="meta-og-image"       property="og:image"       content="https://bluestone-labs-landing.vercel.app/api/og">
  <meta name="twitter:card" content="summary_large_image">
  <meta id="meta-tw-title"       name="twitter:title"       content="Bluestone PIM Labs">
  <meta id="meta-tw-description" name="twitter:description" content="">
  <meta id="meta-tw-image"       name="twitter:image"       content="https://bluestone-labs-landing.vercel.app/api/og">
  <link rel="icon" type="image/png" href="/public/bluestone_pim_logo.png">
  <!-- highlight.js themes: swap disabled attr based on dark mode -->
  <link id="hljs-light" rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
  <link id="hljs-dark"  rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css" disabled>
  <script>
    (function () {
      const stored = localStorage.getItem('theme');
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      if (stored === 'dark' || (!stored && prefersDark)) {
        document.documentElement.classList.add('dark');
        document.getElementById('hljs-light').disabled = true;
        document.getElementById('hljs-dark').disabled = false;
      }
    })();
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class' };</script>
  <script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <style>
    html { scroll-behavior: smooth; }

    /* Reading progress bar */
    #reading-progress {
      position: fixed;
      top: 0; left: 0;
      height: 2px;
      width: 0%;
      background: #3b82f6;
      z-index: 50;
      transition: width 0.1s linear;
    }

    /* Prose styles */
    .prose {
      max-width: 68ch;
      color: inherit;
      line-height: 1.8;
    }
    .prose > * + * { margin-top: 1.25em; }

    .prose h2 {
      font-size: 1.45em;
      font-weight: 700;
      line-height: 1.3;
      margin-top: 2.25em;
      margin-bottom: 0.6em;
      color: inherit;
      padding-bottom: 0.3em;
      border-bottom: 1px solid #e2e8f0;
    }
    .dark .prose h2 { border-bottom-color: #1e293b; }

    .prose h3 {
      font-size: 1.2em;
      font-weight: 600;
      line-height: 1.4;
      margin-top: 2em;
      margin-bottom: 0.4em;
      color: inherit;
    }
    .prose h4 {
      font-size: 1em;
      font-weight: 600;
      margin-top: 1.75em;
      margin-bottom: 0.3em;
      color: inherit;
    }

    .prose p { margin-bottom: 0; }

    .prose a {
      color: #2563eb;
      text-decoration: underline;
      text-underline-offset: 2px;
      text-decoration-color: #93c5fd;
      transition: color 0.15s;
    }
    .dark .prose a { color: #60a5fa; text-decoration-color: #1e3a5f; }
    .prose a:hover { color: #1d4ed8; }
    .dark .prose a:hover { color: #93c5fd; }

    .prose strong { font-weight: 600; }
    .prose em { font-style: italic; }

    .prose ul { list-style-type: disc; padding-left: 1.5em; margin-top: 0.75em; margin-bottom: 0.75em; }
    .prose ol { list-style-type: decimal; padding-left: 1.5em; margin-top: 0.75em; margin-bottom: 0.75em; }
    .prose li { line-height: 1.7; }
    .prose li + li { margin-top: 0.3em; }

    .prose code:not(pre code) {
      font-family: ui-monospace, 'Cascadia Code', 'Fira Code', monospace;
      font-size: 0.875em;
      background: #f1f5f9;
      color: #0f172a;
      padding: 0.15em 0.45em;
      border-radius: 4px;
      border: 1px solid #e2e8f0;
    }
    .dark .prose code:not(pre code) {
      background: #1e293b;
      color: #e2e8f0;
      border-color: #334155;
    }

    .prose pre {
      border-radius: 10px;
      overflow-x: auto;
      font-size: 0.875em;
      line-height: 1.7;
      border: 1px solid #e2e8f0;
      margin-top: 1.5em;
      margin-bottom: 1.5em;
      position: relative;
    }
    .dark .prose pre { border-color: #1e293b; }

    /* hljs adds its own padding via the theme, we ensure it's consistent */
    .prose pre > code.hljs { padding: 1.25em 1.5em; border-radius: 10px; }

    .prose pre code {
      font-family: ui-monospace, 'Cascadia Code', 'Fira Code', monospace;
      font-size: inherit;
    }

    /* Copy button */
    .copy-btn {
      position: absolute;
      top: 0.6rem;
      right: 0.6rem;
      font-size: 11px;
      font-weight: 500;
      padding: 3px 9px;
      border-radius: 5px;
      cursor: pointer;
      font-family: system-ui, sans-serif;
      transition: background 0.15s, color 0.15s;
      background: rgba(0,0,0,0.07);
      color: #64748b;
      border: 1px solid rgba(0,0,0,0.10);
      line-height: 1.6;
    }
    .dark .copy-btn {
      background: rgba(255,255,255,0.08);
      color: #94a3b8;
      border-color: rgba(255,255,255,0.10);
    }
    .copy-btn:hover { background: rgba(0,0,0,0.13); color: #334155; }
    .dark .copy-btn:hover { background: rgba(255,255,255,0.15); color: #e2e8f0; }

    .prose blockquote {
      border-left: 3px solid #3b82f6;
      padding: 0.5em 0 0.5em 1.25em;
      color: #475569;
      font-style: italic;
      margin-top: 1.5em;
      margin-bottom: 1.5em;
    }
    .dark .prose blockquote { color: #94a3b8; }

    .prose hr {
      border: none;
      border-top: 1px solid #e2e8f0;
      margin-top: 3em;
      margin-bottom: 3em;
    }
    .dark .prose hr { border-top-color: #1e293b; }

    .prose img {
      max-width: 100%;
      height: auto;
      border-radius: 10px;
      border: 1px solid #e2e8f0;
      margin-top: 1.5em;
      margin-bottom: 1.5em;
      display: block;
    }
    .dark .prose img { border-color: #1e293b; }

    .prose table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9em;
      margin-top: 1.75em;
      margin-bottom: 1.75em;
      display: block;
      overflow-x: auto;
    }
    .prose th {
      text-align: left;
      padding: 0.5em 1em;
      border-bottom: 2px solid #e2e8f0;
      font-weight: 600;
      white-space: nowrap;
    }
    .dark .prose th { border-bottom-color: #334155; }
    .prose td {
      padding: 0.5em 1em;
      border-bottom: 1px solid #f1f5f9;
    }
    .dark .prose td { border-bottom-color: #1e293b; }
    .prose tr:last-child td { border-bottom: none; }

    /* Heading anchor links */
    .prose h2 .anchor,
    .prose h3 .anchor {
      opacity: 0;
      margin-left: 0.4em;
      color: #94a3b8;
      text-decoration: none;
      font-weight: 400;
      font-size: 0.85em;
      transition: opacity 0.15s;
    }
    .prose h2:hover .anchor,
    .prose h3:hover .anchor { opacity: 1; }
  </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 antialiased min-h-screen">

  <div id="reading-progress"></div>

  <!-- Header -->
  <header class="bg-white dark:bg-slate-900 border-b border-slate-200 dark:border-slate-700/60 sticky top-0 z-10">
    <div class="max-w-4xl mx-auto px-6 py-4 flex items-center justify-between gap-4">
      <a href="/" class="flex items-center gap-3 no-underline shrink-0">
        <img src="/public/bluestone_pim_logo.png" alt="Bluestone PIM" class="h-8 w-auto object-contain">
        <span class="font-semibold text-slate-900 dark:text-slate-100 text-sm hidden sm:inline">Bluestone PIM Labs 🧪</span>
      </a>
      <nav class="flex items-center gap-1 mr-1">
        <a href="/"
          class="text-sm px-3 py-1.5 rounded-lg text-slate-500 dark:text-slate-400 hover:text-slate-900 dark:hover:text-slate-100 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
          Projects
        </a>
        <a href="/blog"
          class="text-sm px-3 py-1.5 rounded-lg font-medium text-blue-600 dark:text-blue-400 bg-blue-50 dark:bg-blue-950/50">
          Blog
        </a>
      </nav>
      <button id="theme-toggle" aria-label="Toggle dark mode"
        class="p-1.5 rounded-lg text-slate-400 dark:text-slate-500 hover:text-slate-600 dark:hover:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors shrink-0">
        <svg id="icon-sun" xmlns="http://www.w3.org/2000/svg" class="hidden dark:block w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364-.707.707M6.343 17.657l-.707.707M17.657 17.657l-.707-.707M6.343 6.343l-.707-.707M12 8a4 4 0 1 0 0 8 4 4 0 0 0 0-8z"/>
        </svg>
        <svg id="icon-moon" xmlns="http://www.w3.org/2000/svg" class="block dark:hidden w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- Disclaimer -->
  <div class="bg-slate-50 dark:bg-slate-800/50 border-b border-slate-200 dark:border-slate-700/60">
    <div class="max-w-4xl mx-auto px-6 py-2 flex items-start gap-2">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 text-slate-400 dark:text-slate-500 shrink-0 mt-0.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <path stroke-linecap="round" stroke-linejoin="round" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0z"/>
      </svg>
      <p class="text-sm text-slate-500 dark:text-slate-400">
        A Bluestone PIM Labs community project. Not an official product. No SLA, no support commitments. Contributions and forks welcome.
      </p>
    </div>
  </div>

  <!-- Post content area -->
  <main class="max-w-4xl mx-auto px-6 py-12">

    <!-- Back link -->
    <a href="/blog"
      class="inline-flex items-center gap-1.5 text-sm text-slate-400 dark:text-slate-500 hover:text-slate-700 dark:hover:text-slate-300 transition-colors mb-10 no-underline group">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 group-hover:-translate-x-0.5 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/>
      </svg>
      Back to Blog
    </a>

    <!-- Loading state -->
    <div id="post-loading" class="py-20 flex items-center justify-center">
      <div class="w-5 h-5 border-2 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
    </div>

    <!-- Error state -->
    <div id="post-error" class="hidden py-20 text-center">
      <p class="text-slate-500 dark:text-slate-400 text-sm mb-4">Post not found.</p>
      <a href="/blog" class="text-sm text-blue-600 dark:text-blue-400 hover:underline">Back to Blog</a>
    </div>

    <!-- Post -->
    <article id="post-article" class="hidden">

      <!-- Hero image (rendered if present in frontmatter) -->
      <div id="post-hero" class="hidden mb-10">
        <img id="post-hero-img" src="" alt="" class="w-full rounded-xl object-cover border border-slate-200 dark:border-slate-700/60" style="max-height:420px;" loading="eager">
      </div>

      <!-- Post header -->
      <header class="mb-10">
        <div class="flex flex-wrap items-center gap-2 mb-4" id="post-meta"></div>
        <h1 id="post-title" class="text-3xl sm:text-4xl font-bold text-slate-900 dark:text-slate-100 leading-tight mb-4"></h1>
        <p id="post-description" class="text-lg text-slate-500 dark:text-slate-400 leading-relaxed"></p>
      </header>

      <!-- Divider -->
      <div class="border-t border-slate-200 dark:border-slate-800 mb-10"></div>

      <!-- Prose body -->
      <div id="post-body" class="prose text-slate-700 dark:text-slate-300"></div>

      <!-- Prev / next navigation -->
      <nav id="post-nav" class="hidden mt-14 pt-8 border-t border-slate-200 dark:border-slate-800">
        <div class="grid grid-cols-2 gap-6">
          <div id="nav-prev"></div>
          <div id="nav-next" class="text-right"></div>
        </div>
      </nav>

    </article>
  </main>

  <!-- Footer -->
  <footer class="border-t border-slate-200 dark:border-slate-800 mt-16">
    <div class="max-w-4xl mx-auto px-6 py-8 flex flex-col sm:flex-row items-start sm:items-center justify-between gap-3">
      <p class="text-sm text-slate-400 dark:text-slate-600">
        Bluestone PIM Labs &middot; Community projects, not official products
      </p>
    </div>
  </footer>

  <script>
    // Theme toggle
    const themeBtn = document.getElementById('theme-toggle');
    const hljsLight = document.getElementById('hljs-light');
    const hljsDark  = document.getElementById('hljs-dark');

    themeBtn.addEventListener('click', () => {
      const isDark = document.documentElement.classList.toggle('dark');
      localStorage.setItem('theme', isDark ? 'dark' : 'light');
      hljsLight.disabled = isDark;
      hljsDark.disabled  = !isDark;
    });

    // Reading progress
    window.addEventListener('scroll', () => {
      const total = document.body.scrollHeight - window.innerHeight;
      const pct = total > 0 ? (window.scrollY / total) * 100 : 0;
      document.getElementById('reading-progress').style.width = pct + '%';
    }, { passive: true });

    // Frontmatter parser
    function parseFrontmatter(src) {
      const match = src.match(/^---\r?\n([\s\S]*?)\r?\n---\r?\n([\s\S]*)$/);
      if (!match) return { meta: {}, body: src };
      const meta = {};
      for (const line of match[1].split('\n')) {
        const colon = line.indexOf(':');
        if (colon === -1) continue;
        const key = line.slice(0, colon).trim();
        const val = line.slice(colon + 1).trim();
        if (key) meta[key] = val;
      }
      return { meta, body: match[2] };
    }

    function formatDate(iso) {
      const d = new Date(iso + 'T00:00:00');
      return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
    }

    // Render post
    function renderPost(slug, src) {
      const { meta, body } = parseFrontmatter(src);

      // Meta tags
      const pageTitle = (meta.title || slug) + ' — Bluestone PIM Labs';
      const pageDesc  = meta.description || '';
      const pageUrl   = `https://bluestone-labs-landing.vercel.app/blog/${slug}`;
      const pageImage = meta.heroImage
        ? `https://bluestone-labs-landing.vercel.app${meta.heroImage}`
        : 'https://bluestone-labs-landing.vercel.app/public/og-image.jpg';

      document.title = pageTitle;
      document.querySelector('meta[name="description"]').content        = pageDesc;
      document.getElementById('meta-canonical').href                    = pageUrl;
      document.getElementById('meta-og-title').content                  = pageTitle;
      document.getElementById('meta-og-description').content            = pageDesc;
      document.getElementById('meta-og-url').content                    = pageUrl;
      document.getElementById('meta-og-image').content                  = pageImage;
      document.getElementById('meta-tw-title').content                  = pageTitle;
      document.getElementById('meta-tw-description').content            = pageDesc;
      document.getElementById('meta-tw-image').content                  = pageImage;

      // Hero image
      if (meta.heroImage) {
        document.getElementById('post-hero-img').src = meta.heroImage;
        document.getElementById('post-hero-img').alt = meta.title || '';
        document.getElementById('post-hero').classList.remove('hidden');
      }

      // Post meta (date, reading time, tags)
      const tags = meta.tags
        ? meta.tags.split(',').map(t => `<span class="inline-block text-xs font-semibold px-2 py-0.5 rounded bg-blue-50 dark:bg-blue-950/50 text-blue-700 dark:text-blue-300 uppercase tracking-wide">${t.trim()}</span>`).join('')
        : '';
      const words = body.trim().split(/\s+/).length;
      const readingTime = Math.max(1, Math.ceil(words / 200)) + ' min read';

      document.getElementById('post-meta').innerHTML = `
        ${meta.date ? `<span class="text-sm text-slate-400 dark:text-slate-500">${formatDate(meta.date)}</span><span class="text-slate-300 dark:text-slate-700">·</span>` : ''}
        <span class="text-sm text-slate-400 dark:text-slate-500">${readingTime}</span>
        ${tags ? `<span class="text-slate-300 dark:text-slate-700">·</span>${tags}` : ''}
      `;

      document.getElementById('post-title').textContent = meta.title || slug;
      if (meta.description) {
        document.getElementById('post-description').textContent = meta.description;
      }

      // Render markdown
      marked.setOptions({ gfm: true, breaks: false });
      document.getElementById('post-body').innerHTML = marked.parse(body);

      // Syntax highlight all code blocks
      document.querySelectorAll('#post-body pre code').forEach(el => hljs.highlightElement(el));

      // Copy buttons on code blocks
      document.querySelectorAll('#post-body pre').forEach(pre => {
        const btn = document.createElement('button');
        btn.className = 'copy-btn';
        btn.textContent = 'Copy';
        btn.addEventListener('click', () => {
          const code = pre.querySelector('code');
          navigator.clipboard.writeText(code.textContent).then(() => {
            btn.textContent = 'Copied!';
            setTimeout(() => { btn.textContent = 'Copy'; }, 2000);
          }).catch(() => {
            btn.textContent = 'Failed';
            setTimeout(() => { btn.textContent = 'Copy'; }, 2000);
          });
        });
        pre.appendChild(btn);
      });

      // Make images lazy
      document.querySelectorAll('#post-body img').forEach(img => { img.loading = 'lazy'; });

      // Anchor links on headings
      function slugify(text) {
        return text.toLowerCase().replace(/[^\w\s-]/g, '').replace(/\s+/g, '-').replace(/-+/g, '-').trim();
      }
      document.querySelectorAll('#post-body h2, #post-body h3').forEach(h => {
        h.id = slugify(h.textContent);
        const a = document.createElement('a');
        a.href = '#' + h.id;
        a.className = 'anchor';
        a.setAttribute('aria-hidden', 'true');
        a.textContent = '#';
        h.appendChild(a);
      });

      document.getElementById('post-loading').classList.add('hidden');
      document.getElementById('post-article').classList.remove('hidden');

      // Prev / next navigation
      fetch('/posts.json')
        .then(r => r.json())
        .then(posts => {
          const idx = posts.findIndex(p => p.slug === slug);
          if (idx === -1) return;
          const older  = posts[idx + 1] || null;
          const newer  = posts[idx - 1] || null;
          if (!older && !newer) return;
          document.getElementById('post-nav').classList.remove('hidden');
          if (older) {
            document.getElementById('nav-prev').innerHTML = `
              <a href="/blog/${older.slug}" class="group block no-underline">
                <div class="text-xs text-slate-400 dark:text-slate-500 mb-1">← Older</div>
                <div class="text-sm font-medium text-slate-700 dark:text-slate-300 group-hover:text-blue-600 dark:group-hover:text-blue-400 transition-colors leading-snug">${older.title}</div>
              </a>`;
          }
          if (newer) {
            document.getElementById('nav-next').innerHTML = `
              <a href="/blog/${newer.slug}" class="group block no-underline">
                <div class="text-xs text-slate-400 dark:text-slate-500 mb-1">Newer →</div>
                <div class="text-sm font-medium text-slate-700 dark:text-slate-300 group-hover:text-blue-600 dark:group-hover:text-blue-400 transition-colors leading-snug">${newer.title}</div>
              </a>`;
          }
        });
    }

    // Load post from ?slug= param
    // Read slug from path (/blog/slug) with ?slug= as fallback
    const parts = window.location.pathname.split('/').filter(Boolean);
    let slug = (parts.length === 2 && parts[0] === 'blog')
      ? parts[1]
      : new URLSearchParams(window.location.search).get('slug');

    if (!slug) {
      document.getElementById('post-loading').classList.add('hidden');
      document.getElementById('post-error').classList.remove('hidden');
    } else {
      fetch(`/posts/${slug}.md`)
        .then(r => {
          if (!r.ok) throw new Error('not found');
          return r.text();
        })
        .then(src => renderPost(slug, src))
        .catch(() => {
          document.getElementById('post-loading').classList.add('hidden');
          document.getElementById('post-error').classList.remove('hidden');
        });
    }
  </script>

</body>
</html>
